<!DOCTYPE html>
<html lang="es">
<head>
    <meta http-equiv="Content-Security-Policy" content="default-src 'self' https://proyectoinstituto-back-end-production.up.railway.app; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com https://cdnjs.cloudflare.com https://unpkg.com; font-src 'self' https://fonts.gstatic.com https://cdnjs.cloudflare.com; img-src 'self' data: https://proyectoinstituto-back-end-production.up.railway.app; script-src 'self' 'unsafe-inline' 'unsafe-eval' https://unpkg.com https://cdnjs.cloudflare.com;">
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Gestión Académica — PA-INAM</title>
  <link rel="stylesheet" href="css/global.css?v=1.0.7">
</head>
<body>
  <div class="background"></div>

  <header class="header">
    <div class="header__content">
      <h1 class="header__title">PA-INAM</h1>
    </div>
  </header>
  <div class="separador"></div>

  <nav class="nav">
    <button class="nav__button" onclick="goBack()">
      <svg xmlns="http://www.w3.org/2000/svg" class="nav__button-icon" viewBox="0 0 20 20" fill="currentColor">
        <path fill-rule="evenodd"
          d="M9.707 16.707a1 1 0 01-1.414 0l-6-6a1 1 0 010-1.414l6-6a1 1 0 011.414 1.414L5.414 9H17a1 1 0 110 2H5.414l4.293 4.293a1 1 0 010 1.414z"
          clip-rule="evenodd" />
      </svg>
    </button>
    <span class="nav__title">Gestión Académica</span>
    <div class="nav__profile">
      <img src="./images/usuario.png" class="nav__profile-img">
      <ul class="nav__profile-link">
        <li><a href="ayuda.html"><img src="./images/help.png" class="nav__profile-img">Ayuda</a></li>
        <li><a href="#"><img src="./images/close.png" class="nav__profile-img">Cerrar Sesión</a></li>
      </ul>
    </div>
  </nav>

  <div class="container">
    <section class="section">
      <div class="section__items">
        <a href="registroAsistencia.html" class="section__item" id="card-ga-asistencia">
          <img src="./images/Asistencia.png" class="section__item-icon" alt="Asistencia">
          Asistencia
        </a>
        <a href="registroNotas.html" class="section__item" id="card-ga-notas">
          <img src="./images/Notas.png" class="section__item-icon" alt="Nota">
          Nota
        </a>
        <a href="registroHorario.html" class="section__item" id="card-ga-horario">
          <img src="./images/Horario.png" class="section__item-icon" alt="Horario">
          Horario
        </a>
        <a href="registroMatricula.html" class="section__item" id="card-ga-matricula">
          <img src="./images/Matricula.png" class="section__item-icon" alt="Matrícula">
          Matrícula
        </a>
        <a href="confirmarMatricula.html" class="section__item" id="card-ga-confirmar-matricula">
          <img src="./images/Matricula.png" class="section__item-icon" alt="Habilitar Matrícula">
          Habilitar Matrícula
        </a>
      </div>
    </section>
  </div>

  <script src="js/global.js"></script>
  <script>
    document.addEventListener('DOMContentLoaded', function () {
      const role = localStorage.getItem('user_role');
      
      document.getElementById('card-ga-asistencia').style.display = 'none';
      document.getElementById('card-ga-notas').style.display = 'none';
      document.getElementById('card-ga-horario').style.display = 'none';
      document.getElementById('card-ga-matricula').style.display = 'none';
      document.getElementById('card-ga-confirmar-matricula').style.display = 'none';
      
      if (role === 'DIRECTOR') {
        document.getElementById('card-ga-asistencia').style.display = 'flex';
        document.getElementById('card-ga-notas').style.display = 'flex';
        document.getElementById('card-ga-horario').style.display = 'flex';
        document.getElementById('card-ga-matricula').style.display = 'flex';
        document.getElementById('card-ga-confirmar-matricula').style.display = 'flex';
      } else if (role === 'DOCENTE') {
        document.getElementById('card-ga-asistencia').style.display = 'flex';
        document.getElementById('card-ga-notas').style.display = 'flex';
      } else if (role === 'ADMINISTRACION') {
        document.getElementById('card-ga-horario').style.display = 'flex';
        document.getElementById('card-ga-matricula').style.display = 'flex';
        document.getElementById('card-ga-confirmar-matricula').style.display = 'flex';
      }
    });
  </script>
</body>
</html>
