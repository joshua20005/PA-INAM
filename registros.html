<!DOCTYPE html>
<html lang="es">
<head>
    <meta http-equiv="Content-Security-Policy" content="default-src 'self' https://proyectoinstituto-back-end-production.up.railway.app; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com https://cdnjs.cloudflare.com https://unpkg.com; font-src 'self' https://fonts.gstatic.com https://cdnjs.cloudflare.com; img-src 'self' data: https://proyectoinstituto-back-end-production.up.railway.app; script-src 'self' 'unsafe-inline' https://unpkg.com https://cdnjs.cloudflare.com;">

  <title>Registros — PA-INAM</title>

<body>
  <div class="background"></div>

  <header class="header">
    <div class="header__content">
      <h1 class="header__title">PA-INAM</h1>
    </div>
  </header>
  <div class="separador"></div>

  <nav class="nav">
    <button class="nav__button" onclick="goBack()">
      <svg xmlns="http://www.w3.org/2000/svg" class="nav__button-icon" viewBox="0 0 20 20" fill="currentColor">
        <path fill-rule="evenodd"
          d="M9.707 16.707a1 1 0 01-1.414 0l-6-6a1 1 0 010-1.414l6-6a1 1 0 011.414 1.414L5.414 9H17a1 1 0 110 2H5.414l4.293 4.293a1 1 0 010 1.414z"
          clip-rule="evenodd" />
      </svg>
    </button>
    <span class="nav__title">Registros</span>
    <div class="nav__profile">
      <img src="./images/usuario.png" class="nav__profile-img">
      <ul class="nav__profile-link">
        <li><a href="ayuda.html"><img src="./images/help.png" class="nav__profile-img">Ayuda</a></li>
        <li><a href="#"><img src="./images/close.png" class="nav__profile-img">Cerrar Sesión</a></li>
      </ul>
    </div>
  </nav>

  <div class="container">
    <section class="section">
      <div class="section__items">
        <a href="registroEstudiante.html" class="section__item">
          <img src="./images/Estudiante.png" class="section__item-icon" alt="Estudiante">
          Estudiante
        </a>
        <a href="registroTutor.html" class="section__item">
          <img src="./images/Tutor.png" class="section__item-icon" alt="Tutor">
          Tutor
        </a>
        <a href="registroMaestro.html" class="section__item">
          <img src="./images/docente.png" class="section__item-icon" alt="Docente">
          Docente
        </a>
        <a href="registroGrupo.html" class="section__item" id="card-reg-grupo">
          <img src="./images/Grupo.png" class="section__item-icon" alt="Grupo">
          Grupo
        </a>
        <a href="registroAsignatura.html" class="section__item" id="card-reg-asignatura">
          <img src="./images/Asignatura.png" class="section__item-icon" alt="Asignatura">
          Asignatura
        </a>
        <a href="listadoEstudiantes.html" class="section__item">
          <img src="./images/Estudiante.png" class="section__item-icon" alt="Listado Estudiantes">
          Listado Estudiantes
        </a>
        <a href="confirmarMatricula.html" class="section__item">
          <img src="./images/Matricula.png" class="section__item-icon" alt="Habilitar Matrícula">
          Habilitar Matrícula

        <a href="listadoDocentes.html" class="section__item">
          <img src="./images/docente.png" class="section__item-icon" alt="Listado Docentes">
          Listado Docentes
        </a>
      </div>
    </section>
  </div>

  <script src="js/global.js"></script>
  <script>
    document.addEventListener('DOMContentLoaded', function () {
      const role = localStorage.getItem('user_role');
      if (role === 'ADMINISTRACION') {
        const cardGrupo = document.getElementById('card-reg-grupo');
        const cardAsignatura = document.getElementById('card-reg-asignatura');
        if (cardGrupo) cardGrupo.style.display = 'none';
        if (cardAsignatura) cardAsignatura.style.display = 'none';
      }
    });
  </script>
