<!DOCTYPE html>
<html lang="es">
<head>
    <meta http-equiv="Content-Security-Policy" content="default-src 'self' https://proyectoinstituto-back-end-production.up.railway.app; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com https://cdnjs.cloudflare.com https://unpkg.com; font-src 'self' https://fonts.gstatic.com https://cdnjs.cloudflare.com; img-src 'self' data: https://proyectoinstituto-back-end-production.up.railway.app; script-src 'self' 'unsafe-inline' 'unsafe-eval' https://unpkg.com https://cdnjs.cloudflare.com;">
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Registro de Horarios — PA-INAM</title>
  <link rel="stylesheet" href="css/global.css?v=1.0.7">
</head>
<body>
  <div class="background"></div>

  <nav class="nav">
    <div class="nav__container">
      <button class="nav__button" onclick="goBack()">
        <svg xmlns="http://www.w3.org/2000/svg" class="nav__button-icon" viewBox="0 0 20 20" fill="currentColor">
          <path fill-rule="evenodd"
            d="M9.707 16.707a1 1 0 01-1.414 0l-6-6a1 1 0 010-1.414l6-6a1 1 0 011.414 1.414L5.414 9H17a1 1 0 110 2H5.414l4.293 4.293a1 1 0 010 1.414z"
            clip-rule="evenodd" />
        </svg>
      </button>
    </div>
    <div class="nav__item">
      <span class="nav__title">Horario</span>
    </div>
    <div class="nav__profile">
      <img src="./images/usuario.png" class="nav__profile-img">
      <ul class="nav__profile-link">
        <li><a href="ayuda.html"><img src="./images/help.png" class="nav__profile-img">Ayuda</a></li>
        <li><a href="#"><img src="./images/close.png" class="nav__profile-img">Cerrar Sesión</a></li>
      </ul>
    </div>
  </nav>
  <div class="separador"></div>

  <div class="layout__conteiner">
    <div class="layout">
      <div class="layout__image">
        <img src="./images/Horario.png" alt="Imagen" style="position: sticky; top: 20px;">
      </div>

      <div class="layout__content" style="flex: 1; max-width: 950px; width: 100%; display: flex; flex-direction: column; gap: 20px;">
        <section class="layout__section" id="form-horario-section" style="width: 100%; max-width: 100%; margin: 0;">
        <div class="section">
          <div class="section__title">Detalles de Horario</div>
          <form class="form" id="form-validation" novalidate>
            <input type="hidden" id="id_horario" name="id_horario">
            <div class="form__grid" style="max-width: 100%;">
              <div class="form__group">
                <label class="form__label" for="docente">Docente</label>
                <select class="form__control" id="docente" name="docente" required>
                  <option value="" disabled selected>Cargando docentes...</option>
                </select>
              </div>
              <div class="form__group">
                <label class="form__label" for="anio">Grupo / Año Académico</label>
                <select class="form__control" id="anio" name="anio" required>
                  <option value="" disabled selected>Cargando grupos...</option>
                </select>
              </div>
              <div class="form__group">
                <label class="form__label" for="asignatura">Asignatura</label>
                <select class="form__control" id="asignatura" name="asignatura" required>
                  <option value="" disabled selected>Seleccione un grupo primero</option>
                </select>
              </div>
              <div class="form__group">
                <label class="form__label" for="turno">Turno</label>
                <select class="form__control" id="turno" name="turno" required>
                  <option value="Matutino" selected>Matutino (Mañana)</option>
                  <option value="Vespertino">Vespertino (Tarde)</option>
                </select>
              </div>
              <div class="form__group">
                <label class="form__label" for="dia">Día</label>
                <select class="form__control" id="dia" name="dia" required>
                  <option value="Lunes" selected>Lunes</option>
                  <option value="Martes">Martes</option>
                  <option value="Miércoles">Miércoles</option>
                  <option value="Jueves">Jueves</option>
                  <option value="Viernes">Viernes</option>
                </select>
              </div>
              <div class="form__group">
                <label class="form__label" for="hora">Hora</label>
                <select class="form__control" id="hora" name="hora" required>
                  <option value="" disabled selected>Seleccione un turno primero</option>
                </select>
              </div>
            </div>
            <div class="form__button">
              <button type="submit" class="form__button--green" onclick="guardarhorario(event)">Guardar</button>
              <button type="submit" class="form__button--purple" onclick="editarhorario(event)">Editar</button>
              <button type="submit" class="form__button--red" onclick="eliminarhorario(event)">Eliminar</button>
            </div>
          </form>
        </div>
      </section>

      <!-- Section for Automatic Rotational Schedule Generator -->
      <section class="layout__section" id="generator-horario-section" style="width: 100%; max-width: 100%; margin: 0;">
        <div class="section">
          <div class="section__title">⚙️ Generador Rotativo de Horarios</div>
          <div class="form" style="display: flex; flex-direction: column; gap: 15px;">
            <div class="form__grid" style="max-width: 100%; padding: 0;">
              <div class="form__group">
                <label class="form__label" for="template-select">Seleccione una Plantilla de Distribución</label>
                <select class="form__control" id="template-select">
                  <option value="intenso">Horario Intenso (6 Clases/Día - Carga Académica Máxima)</option>
                  <option value="flexible" selected>Horario Flexible (5 Clases/Día - 1 Descanso Rotativo)</option>
                  <option value="relajado">Horario Relajado (4 Clases/Día - 2 Descansos Rotativos)</option>
                </select>
              </div>
            </div>
            <div class="form__button" style="margin-top: 0; padding-top: 15px; border-top: none;">
              <button type="button" class="form__button--purple" onclick="generateTemplateSchedule()" style="width: 100%; font-weight: 700; letter-spacing: 0.5px;">
                ⚡ Generar Horario Automático Rotativo
              </button>
            </div>
          </div>
        </div>
      </section>

      <section class="layout__section" style="width: 100%; max-width: 100%; margin: 0;">
        <div class="section">
          <div class="section__title">Horario de Clases</div>
          <div class="table-responsive">
            <table class="form__table" id="tabla-horario">
              <thead>
                <tr>
                  <th class="form__table-campo--header" style="width: 20%;">Hora</th>
                  <th class="form__table-campo--header" style="width: 20%;">Código</th>
                  <th class="form__table-campo--header" style="width: 25%;">Asignatura</th>
                  <th class="form__table-campo--header" style="width: 25%;">Docente</th>
                  <th class="form__table-campo--header" style="width: 10%;" id="th-accion">Acción</th>
                </tr>
              </thead>
              <tbody id="cuerpo-tabla-horario">
                <tr>
                  <td colspan="5" class="form__table-campo" style="color: var(--gray-600); font-style: italic; padding: 20px;">
                    Seleccione un grupo para cargar el horario
                  </td>
                </tr>
              </tbody>
            </table>
          </div>
        </div>
      </section>

      <!-- General Overview Section Redesigned like Matricula -->
      <section class="layout__section" style="width: 100%; max-width: 100%; margin: 0;">
        <div class="section">
          <div class="section__title" style="justify-content: space-between;">
            <span style="display: flex; align-items: center; gap: 8px;">📅 Vista General de Horarios</span>
            <span id="general-view-day-label" style="color: var(--accent); font-weight: bold; font-size: 1.1rem;">Lunes</span>
          </div>
          
          <div class="tabs-header" style="margin-bottom: 20px; justify-content: flex-start;">
            <button type="button" class="tab-btn active" id="btn-tab-matutino" onclick="switchGeneralTab('Matutino')">
              <span class="tab-number">☀️</span>
              <span class="tab-text">Turno Matutino (Mañana)</span>
            </button>
            <button type="button" class="tab-btn" id="btn-tab-vespertino" onclick="switchGeneralTab('Vespertino')">
              <span class="tab-number">🌙</span>
              <span class="tab-text">Turno Vespertino (Tarde)</span>
            </button>
          </div>

          <!-- Independent Filter Input -->
          <div class="form__group" style="margin-bottom: 20px; max-width: 450px; margin-left: 0;">
            <label class="form__label" for="search-general">Filtrar Grupo / Sección</label>
            <input type="text" class="form__control" id="search-general" placeholder="🔍 Escribe para filtrar grupos (ej: Primer Año, Sección A)..." oninput="filterGeneralView()">
          </div>

          <div id="vista-general-grid" style="display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 20px; padding: 10px 0;">
            <!-- Cards populated by JS -->
          </div>
        </div>
      </section>
      </div>

    </div>
  </div>

  <script src="js/global.js?v=1.0.5"></script>
  <script src="js/scriptHorario.js?v=1.0.5"></script>
</body>
</html>
