<!DOCTYPE html>
<html lang="es">
<head>
    <meta http-equiv="Content-Security-Policy" content="default-src 'self' http://127.0.0.1:8000; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com https://cdnjs.cloudflare.com https://unpkg.com; font-src 'self' https://fonts.gstatic.com https://cdnjs.cloudflare.com; img-src 'self' data: http://127.0.0.1:8000; script-src 'self' 'unsafe-inline' 'unsafe-eval' https://unpkg.com https://cdnjs.cloudflare.com;">
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Registro Estudiante — PA-INAM</title>
  <link rel="stylesheet" href="css/global.css">
</head>
<body>
  <div class="background"></div>

  <nav class="nav">
    <div class="nav__container">
      <button class="nav__button" onclick="goBack()">
        <svg xmlns="http://www.w3.org/2000/svg" class="nav__button-icon" viewBox="0 0 20 20" fill="currentColor">
          <path fill-rule="evenodd"
            d="M9.707 16.707a1 1 0 01-1.414 0l-6-6a1 1 0 010-1.414l6-6a1 1 0 011.414 1.414L5.414 9H17a1 1 0 110 2H5.414l4.293 4.293a1 1 0 010 1.414z"
            clip-rule="evenodd" />
        </svg>
      </button>
    </div>
    <div class="nav__item">
      <span class="nav__title">Estudiante</span>
    </div>
    <div class="nav__profile">
      <img src="./images/usuario.png" class="nav__profile-img">
      <ul class="nav__profile-link">
        <li><a href="ayuda.html"><img src="./images/help.png" class="nav__profile-img">Ayuda</a></li>
        <li><a href="#"><img src="./images/close.png" class="nav__profile-img">Cerrar Sesión</a></li>
      </ul>
    </div>
  </nav>
  <div class="separador"></div>

  <div class="layout__conteiner">
    <div class="layout">
      <div class="layout__image">
        <img src="./images/Estudiante.png" alt="imagen">
      </div>

      <section class="layout__section">
        <div class="section">
          <div class="section__title">Registro de Estudiante</div>
          <form class="form" id="form-validation" novalidate>
            <div class="form__grid">
              <div class="form__group">
                <label class="form__label" for="code_student">Cód.Estudiante</label>
                <input type="text" class="form__control" id="code_student" name="codestudiante"
                  placeholder="Ingrese el Código" required>
              </div>
              <div class="form__group">
                <label class="form__label" for="name_student">Nombre</label>
                <input type="text" class="form__control" id="name_student" name="nombreestudiante"
                  placeholder="Ingrese el nombre de Estudiante" required>
              </div>
              <div class="form__group">
                <label class="form__label" for="surname_student">Apellidos</label>
                <input type="text" class="form__control" id="surname_student" name="apellidoestudiante"
                  placeholder="Ingrese los Apellidos" required>
              </div>
              <div class="form__group">
                <label class="form__label" for="birthday_student">Fecha de Nacimiento</label>
                <input type="date" class="form__control" id="birthday_student" name="fecha" required>
              </div>
              <div class="form__group">
                <label class="form__label" for="phone_student">N.Teléfono</label>
                <input type="tel" class="form__control" id="phone_student" name="phone_student"
                  placeholder="Ingrese su Numero de Teléfono" required>
              </div>
              <div class="form__group">
                <label class="form__label" for="email_student">Correo Electrónico</label>
                <input type="email" class="form__control" id="email_student" name="email_student"
                  placeholder="Ingrese su Email" required>
              </div>
            </div>
            
            <!-- Apartado Administrativo (Cuenta) -->
            <div class="section__title mt-2" style="border-bottom: 2px solid var(--accent); padding-bottom: 6px; margin-bottom: 12px; font-size: 1.1rem; color: var(--primary-dark);">
              🔒 Cuenta de Acceso (Administración)
            </div>
            <div class="form__grid" style="margin-bottom: 15px;">
              <div class="form__group">
                <label class="form__label">Cuenta de Acceso (Tutor/Estudiante)</label>
                <button type="button" id="btn-create-user" class="form__button--purple" style="height: 42px; width: 100%; border: none; font-weight: 600; border-radius: var(--radius-sm); cursor: pointer; padding: 10px 15px; color: var(--white); font-family: var(--font-heading); display: inline-flex; align-items: center; justify-content: center; gap: 8px;">
                  🔑 Generar Cuenta de Usuario
                </button>
                <div id="user-status-text" style="display: none; font-weight: bold; color: var(--success); font-size: 0.85rem; margin-top: 6px; text-align: center;">
                  ✓ Cuenta de usuario activa
                </div>
              </div>
            </div>

            <div class="form__button">
              <button id="register-btn" type="submit" class="form__button--green">Guardar</button>
              <button id="edit-btn" type="submit" class="form__button--purple">Editar</button>
              <button type="submit" class="form__button--red">Eliminar</button>
            </div>
          </form>
        </div>
      </section>
    </div>
  </div>

  <script src="js/global.js"></script>
  <script src="./js/Creados/Catalagos/indexEstudiante.js"></script>
  <script>
    const addForm = document.getElementById("form-validation");
    addForm.addEventListener("submit", (e) => {
      if (addForm.checkValidity() === false) {
        e.preventDefault();
        e.stopPropagation();
        addForm.classList.add('was-validated');
        return false;
      }
    });
  </script>
</body>
</html>
